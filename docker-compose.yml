services:
  api:
    build: ./backend
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    env_file: .env
    volumes:
      - ./data:/data
    ports:
      - "127.0.0.1:8438:8438"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 2g
    cpus: 2.0
    healthcheck:
      test: ["CMD", "python", "healthcheck.py"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  web:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8439:8080"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 512m
    cpus: 1.0
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      api:
        condition: service_healthy
