services:
  api:
    build: ./backend
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    env_file: .env
    volumes:
      - ./data:/data
    ports:
      - "8438:8438"
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
    healthcheck:
      test: ["CMD", "python", "healthcheck.py"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  web:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "8439:80"
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      api:
        condition: service_healthy
