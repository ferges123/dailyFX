name: Build and Publish Docker Images

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Image tag/version (e.g. v1.0.0, latest)'
        required: true
        default: 'latest'

env:
  REGISTRY: ghcr.io
  # Używa nazwy użytkownika i nazwy repozytorium jako bazy
  IMAGE_BASE: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Przygotowanie dedykowanego pliku Dockerfile dla schedulera (dziedziczy po API lub buduje tak samo z innym CMD)
      - name: Create Scheduler Dockerfile
        run: |
          cat <<EOF > ./backend/Dockerfile.scheduler
          FROM python:3.13-slim
          ENV PYTHONDONTWRITEBYTECODE=1
          ENV PYTHONUNBUFFERED=1
          WORKDIR /app
          COPY pyproject.toml ./
          RUN pip install --no-cache-dir -e .
          COPY alembic.ini ./
          COPY run_opencv_tests.py ./
          COPY tests ./tests
          COPY app ./app
          CMD ["python", "-m", "app.workers.scheduler"]
          EOF

      # 1. Budowanie i wysyłanie obrazu API
      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}-api:${{ github.event.inputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 2. Budowanie i wysyłanie obrazu Schedulera
      - name: Build and push Scheduler image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.scheduler
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}-scheduler:${{ github.event.inputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 3. Budowanie i wysyłanie obrazu Web (Frontend)
      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}-web:${{ github.event.inputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
