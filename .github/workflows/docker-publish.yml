name: Build and Publish Docker Images

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Image tag/version (e.g. v1.0.0, latest)'
        required: true
        default: 'latest'

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Downcase repository name
        run: |
          echo "IMAGE_BASE=ghcr.io/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 1. Budowanie i wysyłanie obrazu API
      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}-api:${{ github.event.inputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 2. Budowanie i wysyłanie obrazu Web (Frontend)
      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}-web:${{ github.event.inputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
