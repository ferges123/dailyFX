name: Build and Publish Docker Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Image tag/version (e.g. v1.0.0, latest)'
        required: true
        default: 'latest'

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Downcase repository name
        run: |
          echo "IMAGE_BASE=ghcr.io/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine tags
        id: tags
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            API_TAGS="${{ env.IMAGE_BASE }}-api:${VERSION}"
            WEB_TAGS="${{ env.IMAGE_BASE }}-web:${VERSION}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            API_TAGS="${{ env.IMAGE_BASE }}-api:${{ github.ref_name }},${{ env.IMAGE_BASE }}-api:latest"
            WEB_TAGS="${{ env.IMAGE_BASE }}-web:${{ github.ref_name }},${{ env.IMAGE_BASE }}-web:latest"
          else
            SHA_SHORT=$(git rev-parse --short HEAD)
            API_TAGS="${{ env.IMAGE_BASE }}-api:latest,${{ env.IMAGE_BASE }}-api:sha-${SHA_SHORT}"
            WEB_TAGS="${{ env.IMAGE_BASE }}-web:latest,${{ env.IMAGE_BASE }}-web:sha-${SHA_SHORT}"
          fi
          echo "api_tags=${API_TAGS}" >> $GITHUB_OUTPUT
          echo "web_tags=${WEB_TAGS}" >> $GITHUB_OUTPUT

      # 1. Budowanie i wysyłanie obrazu API
      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.api_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 2. Budowanie i wysyłanie obrazu Web (Frontend)
      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.web_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
