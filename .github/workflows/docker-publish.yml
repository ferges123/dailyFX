name: Build and Publish Docker Images

on:
  workflow_run:
    workflows: [ 'CI' ]
    types: [ completed ]

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-and-push:
    if: >-
      ${{
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_repository.full_name == github.repository &&
        (
          github.event.workflow_run.head_branch == 'main' ||
          startsWith(github.event.workflow_run.head_branch, 'v')
        )
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Downcase repository name
        run: |
          echo "IMAGE_BASE=ghcr.io/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Determine tags
        id: tags
        run: |
          if [[ "${{ github.event.workflow_run.head_branch }}" == v* ]]; then
            RELEASE_TAG="${{ github.event.workflow_run.head_branch }}"
            API_TAGS="${{ env.IMAGE_BASE }}-api:${RELEASE_TAG},${{ env.IMAGE_BASE }}-api:latest"
            WEB_TAGS="${{ env.IMAGE_BASE }}-web:${RELEASE_TAG},${{ env.IMAGE_BASE }}-web:latest"
          else
            SHA_SHORT=$(git rev-parse --short HEAD)
            API_TAGS="${{ env.IMAGE_BASE }}-api:latest,${{ env.IMAGE_BASE }}-api:sha-${SHA_SHORT}"
            WEB_TAGS="${{ env.IMAGE_BASE }}-web:latest,${{ env.IMAGE_BASE }}-web:sha-${SHA_SHORT}"
          fi
          echo "api_tags=${API_TAGS}" >> $GITHUB_OUTPUT
          echo "web_tags=${WEB_TAGS}" >> $GITHUB_OUTPUT

      # 1. Budowanie i skanowanie obrazu API
      - name: Build API image for scanning
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          load: true
          tags: dailyfx-api:scan
          cache-from: type=gha

      - name: Scan API image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'dailyfx-api:scan'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      - name: Build and push API image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.api_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 2. Budowanie i skanowanie obrazu Web (Frontend)
      - name: Build Web image for scanning
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          load: true
          tags: dailyfx-web:scan
          cache-from: type=gha

      - name: Scan Web image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'dailyfx-web:scan'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      - name: Build and push Web image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.web_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
